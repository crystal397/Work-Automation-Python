# ────────────────────────────────────────────────────────────────
# 계약 메타데이터 입력 양식 (contract_meta v0.1.0)
#
# 사용법
#   1) 각 leaf 필드는 다음 구조로 채운다:
#        필드명:
#          value: <값>
#          _source:
#            file: <원본 파일명>
#            page: <PDF 페이지 1-base, 엑셀이면 생략>
#            sheet: <엑셀 시트명, 엑셀일 때만>
#            cell:  <엑셀 셀 주소, 엑셀일 때만>
#            field_label: <원본 문서의 라벨>
#            raw_text: <원본에서 그대로 옮긴 값 — 검증용>
#            method: manual | pdf_text | ocr | computed | cross_check
#
#   2) 사람이 직접 입력하는 경우 method: manual
#      자동 추출은 method: pdf_text (텍스트 PDF) / ocr (이미지 PDF)
#      한글금액 → 숫자 등 다른 필드에서 산출 시 method: computed
#
#   3) `contract-meta build contract_meta.yaml` 실행 시
#      - ContractMeta JSON 출력
#      - 한글금액↔숫자 일치, 변경계약 누계, 날짜 산술 자동 검증
#      - extraction_report.md 에 검증 결과 정리
# ────────────────────────────────────────────────────────────────
schema_version: "0.1.0"

# ─────── 사업 (project) ───────
project:
  name:
    value: ""
    _source: { file: "", page: 1, field_label: "공사명", raw_text: "", method: "manual" }
  name_short:
    value: ""
    _source: { file: "", method: "manual" }
  client_type:
    value: "국가"   # 국가 | 지방 | 민간
    _source: { file: "", method: "manual" }
  contract_form:
    value: "장기계속"   # 장기계속 | 계속비 | 단년도
    _source: { file: "", method: "manual" }
  bidding_method:
    value: "내역입찰"   # 내역입찰 | 총액입찰
    _source: { file: "", method: "manual" }
  vat_type:
    value: "영세율"   # 영세율 | 일반과세
    _source: { file: "", method: "manual" }
  bid_announcement_date:
    # 입찰공고일 — 보고서 5.4 적용 법령 검색의 기준일.
    # `contract-meta laws-import` 가 이 날짜로 22_laws_import 호출.
    # 없으면 5.4 자동 생성 불가 → 사람이 직접 채우거나 CLI 인자로 전달.
    value: null
    _source: { file: "", page: 1, field_label: "공고일", raw_text: "", method: "manual" }

